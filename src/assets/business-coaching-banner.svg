<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Бизнес-аналитика и рост</title>
  <desc id="desc">Баннер с ноутбуком, графиком роста, свечением и деловыми элементами.</desc>

  <defs>
    <linearGradient id="bgMain" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#081b35"/>
      <stop offset="45%" stop-color="#11335f"/>
      <stop offset="100%" stop-color="#1b4d88"/>
    </linearGradient>

    <radialGradient id="spark" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#8ad4ff" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffe8a3"/>
      <stop offset="50%" stop-color="#ffc95d"/>
      <stop offset="100%" stop-color="#d88a24"/>
    </linearGradient>

    <linearGradient id="blueGlass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ccf4ff"/>
      <stop offset="100%" stop-color="#74c6ea"/>
    </linearGradient>

    <filter id="blur12">
      <feGaussianBlur stdDeviation="12"/>
    </filter>

    <filter id="blur5">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bgMain)"/>

  <!-- ambient stars -->
  <g fill="#e8f7ff" opacity="0.9">
    <circle cx="120" cy="190" r="3"/><circle cx="220" cy="140" r="2"/><circle cx="390" cy="205" r="2"/>
    <circle cx="520" cy="180" r="3"/><circle cx="640" cy="145" r="2"/><circle cx="740" cy="230" r="2"/>
    <circle cx="890" cy="160" r="3"/><circle cx="980" cy="220" r="2"/><circle cx="1130" cy="140" r="2"/>
    <circle cx="1260" cy="210" r="3"/><circle cx="1390" cy="170" r="2"/><circle cx="1470" cy="250" r="3"/>
  </g>

  <!-- left and right glow bulbs style -->
  <circle cx="60" cy="460" r="90" fill="url(#gold)" opacity="0.9"/>
  <circle cx="60" cy="460" r="135" fill="url(#spark)" opacity="0.45"/>
  <circle cx="1470" cy="250" r="70" fill="url(#gold)" opacity="0.85"/>
  <circle cx="1470" cy="250" r="110" fill="url(#spark)" opacity="0.35"/>

  <!-- golden swirl -->
  <path d="M40 650C250 730 500 700 710 625C900 560 1160 540 1560 620" fill="none" stroke="url(#gold)" stroke-width="18" opacity="0.9"/>
  <path d="M10 700C320 790 650 760 930 650C1160 560 1360 570 1590 650" fill="none" stroke="#fff2b5" stroke-width="7" opacity="0.7"/>

  <!-- laptop -->
  <g transform="translate(180 470)">
    <rect x="0" y="0" width="380" height="220" rx="18" fill="#26313f"/>
    <rect x="18" y="20" width="344" height="170" rx="10" fill="#d8f1ff"/>
    <rect x="130" y="200" width="120" height="12" rx="6" fill="#9aa3ab"/>
    <rect x="-30" y="218" width="440" height="26" rx="13" fill="#c2c8d0"/>

    <rect x="35" y="150" width="24" height="30" fill="#4db4e8"/>
    <rect x="65" y="125" width="24" height="55" fill="#6bc8f2"/>
    <rect x="95" y="137" width="24" height="43" fill="#53b5ea"/>
    <rect x="125" y="108" width="24" height="72" fill="#84d8f7"/>
    <rect x="155" y="118" width="24" height="62" fill="#6ec8f0"/>
    <rect x="185" y="95" width="24" height="85" fill="#9de6ff"/>
    <rect x="215" y="102" width="24" height="78" fill="#6cc1ea"/>
    <rect x="245" y="130" width="24" height="50" fill="#4aa7de"/>
    <circle cx="300" cy="145" r="30" fill="#6fcaf0"/>
    <path d="M300 145 L330 145 A30 30 0 0 1 309 173 Z" fill="#2f7bc2"/>
  </g>

  <!-- central hand glow platform -->
  <ellipse cx="805" cy="560" rx="250" ry="52" fill="#9ee7ff" opacity="0.45" filter="url(#blur5)"/>
  <path d="M610 560C690 520 760 518 840 540C900 557 960 552 1030 530C980 585 930 613 860 620C770 629 690 611 610 560Z" fill="#86d7fb" opacity="0.85"/>

  <!-- central chart -->
  <g transform="translate(680 360)">
    <rect x="0" y="120" width="52" height="110" rx="5" fill="url(#blueGlass)"/>
    <rect x="74" y="86" width="52" height="144" rx="5" fill="url(#blueGlass)"/>
    <rect x="148" y="60" width="52" height="170" rx="5" fill="url(#blueGlass)"/>
    <rect x="222" y="32" width="52" height="198" rx="5" fill="url(#blueGlass)"/>
    <rect x="296" y="-5" width="52" height="235" rx="5" fill="url(#blueGlass)"/>

    <path d="M-20 170L70 110L145 135L230 50L325 -20" fill="none" stroke="#e8fcff" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
    <polygon points="325,-20 390,10 352,-72" fill="#fff6d2"/>
  </g>

  <!-- icon circles top -->
  <g>
    <circle cx="180" cy="210" r="52" fill="#9edfff" opacity="0.8"/>
    <circle cx="180" cy="210" r="35" fill="none" stroke="#2567a8" stroke-width="8"/>
    <circle cx="180" cy="210" r="18" fill="none" stroke="#2567a8" stroke-width="8"/>

    <circle cx="520" cy="225" r="58" fill="#7dcaff" opacity="0.75"/>
    <path d="M520 225L555 215A38 38 0 1 1 500 192Z" fill="#ffbe39"/>

    <circle cx="1220" cy="250" r="42" fill="#ffd26c" opacity="0.9"/>
    <circle cx="1220" cy="250" r="65" fill="url(#spark)" opacity="0.35"/>

    <circle cx="1230" cy="520" r="45" fill="#8dcfff" opacity="0.7"/>
  </g>

  <!-- right clipboard/books -->
  <g transform="translate(1280 430)">
    <rect x="0" y="50" width="210" height="260" rx="8" fill="#f5f8ff"/>
    <rect x="75" y="24" width="62" height="30" rx="6" fill="#d5b26a"/>
    <rect x="28" y="95" width="70" height="45" fill="#e7f4ff"/>
    <rect x="112" y="95" width="70" height="45" fill="#e7f4ff"/>
    <rect x="28" y="150" width="70" height="45" fill="#eef7ff"/>
    <rect x="112" y="150" width="70" height="45" fill="#eef7ff"/>
    <rect x="28" y="205" width="70" height="45" fill="#e7f4ff"/>
    <rect x="112" y="205" width="70" height="45" fill="#e7f4ff"/>

    <rect x="20" y="330" width="130" height="24" rx="6" fill="#e2b85b"/>
    <rect x="30" y="354" width="150" height="24" rx="6" fill="#7ca9df"/>
  </g>

  <!-- coins -->
  <g transform="translate(70 640)">
    <ellipse cx="0" cy="0" rx="46" ry="10" fill="#e8b448"/>
    <rect x="-46" y="-70" width="92" height="70" fill="#efc25c"/>
    <ellipse cx="0" cy="-70" rx="46" ry="10" fill="#ffd777"/>
  </g>
  <g transform="translate(130 640)">
    <ellipse cx="0" cy="0" rx="42" ry="9" fill="#e8b448"/>
    <rect x="-42" y="-52" width="84" height="52" fill="#efc25c"/>
    <ellipse cx="0" cy="-52" rx="42" ry="9" fill="#ffd777"/>
  </g>

  <!-- soft haze -->
  <ellipse cx="800" cy="450" rx="500" ry="240" fill="url(#spark)" opacity="0.35" filter="url(#blur12)"/>
</svg>
